name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    environment: npm-publish
    permissions:
      contents: write # push the release commit + tags
      id-token: write # npm OIDC Trusted Publishing
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build packages
        run: bun run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify pending changesets
        run: ./scripts/verify-pending-changesets.ts

      - name: Apply version bump & generate changelog
        run: bun run changeset:version

      - name: Summarize versions
        run: ./scripts/summarize-versions.ts

      - name: Commit & push version bump
        run: |
          git add -A
          git commit -m "chore(release): version packages"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Ignore packages excluded from release
        run: ./scripts/ignore-packages.ts

      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: bun run changeset:publish

      - name: Push git tags
        run: git push origin --tags

      - name: Create GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/create-github-releases.ts
